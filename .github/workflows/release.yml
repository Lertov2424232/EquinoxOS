name: release

# Auto-build a release every time `main` updates. Builds the ISO + kernel
# on a Linux cross-toolchain container, then publishes a GitHub Release
# named after the run number and commit SHA. Marked as pre-release so
# stable manual releases stay distinguishable.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build + publish release
    runs-on: ubuntu-latest
    container:
      image: randomdude/gcc-cross-x86_64-elf:latest

    steps:
      - name: Install host build tools
        run: |
          set -eux
          apt-get update
          apt-get install -y --no-install-recommends \
            nasm xorriso make python3 git ca-certificates
          ln -sf /usr/bin/python3 /usr/local/bin/python

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # нужен для git log в release notes

      - name: Show toolchain versions
        run: |
          x86_64-elf-gcc --version | head -1
          x86_64-elf-ld  --version | head -1
          nasm --version
          xorriso --version 2>&1 | head -1

      - name: Build (make ci)
        run: |
          set -eux
          make -j"$(nproc)" ci

      - name: Sanity-check artefacts
        run: |
          set -eux
          test -f kernel.elf
          test -f equos.iso
          ls -lh kernel.elf equos.iso

      - name: Compute release metadata
        id: meta
        run: |
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          TAG="build-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          NAME="Auto-build #${GITHUB_RUN_NUMBER} (${SHORT_SHA})"
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          echo "name=${NAME}"   >> "$GITHUB_OUTPUT"
          echo "sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        id: notes
        run: |
          set -eu
          {
            echo "Auto-generated build of \`main\` @ \`${{ steps.meta.outputs.sha }}\`."
            echo
            echo "**Commit:** ${GITHUB_SHA}"
            echo "**Workflow run:** [#${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            echo
            echo "### Last 20 commits"
            git -c safe.directory='*' log -20 --pretty='- %h %s (%an)'
          } > release-notes.md
          cat release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body_path: release-notes.md
          prerelease: false
          make_latest: "true"
          fail_on_unmatched_files: true
          files: |
            equos.iso
            kernel.elf
